<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ballon Turbo - Royal Decoder V320</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Cairo:wght@300;400;700;900&display=swap');
        body { background-color: #020617; color: #f8fafc; font-family: 'Cairo', sans-serif; }
        .imperial-glass { background: rgba(239, 68, 68, 0.05); backdrop-filter: blur(15px); border: 1px solid rgba(239, 68, 68, 0.2); }
        input, textarea { background: #0f172a !important; border: 1px solid #1e293b !important; color: #fff !important; }
        input:focus { border-color: #ef4444 !important; outline: none; box-shadow: 0 0 10px rgba(239, 68, 68, 0.3); }
        .badge { background: rgba(239, 68, 68, 0.2); color: #f87171; border: 1px solid rgba(239, 68, 68, 0.3); padding: 2px 10px; border-radius: 8px; font-size: 10px; font-weight: bold; text-transform: uppercase; }
        .server-card { border-right: 5px solid #ef4444; background: linear-gradient(to left, rgba(239, 68, 68, 0.05), transparent); transition: 0.3s; }
        .server-card:hover { transform: translateX(-5px); background: rgba(239, 68, 68, 0.1); }
    </style>
</head>
<body class="p-4 md:p-10">

    <div class="max-w-6xl mx-auto">
        <header class="flex justify-between items-center mb-12">
            <h1 class="text-4xl font-black text-red-500 tracking-tighter">مفكك الشفرات الملكي V320</h1>
            <a href="index.html" class="text-slate-500 hover:text-blue-400 transition-all font-bold flex items-center gap-2">
                العودة للمصنع <i class="fas fa-arrow-left"></i>
            </a>
        </header>

        <div class="grid grid-cols-1 lg:grid-cols-12 gap-10">
            
            <!-- لوحة الإدخال (الجهة اليمنى) -->
            <div class="lg:col-span-5 space-y-6">
                <div class="imperial-glass p-8 rounded-[2.5rem] shadow-2xl border-red-500/20">
                    <h2 class="text-xl font-bold mb-6 text-red-400 flex items-center gap-3">
                        <i class="fas fa-microchip"></i> تحليل البيانات المشفرة
                    </h2>
                    
                    <div class="space-y-6">
                        <div class="space-y-2">
                            <label class="text-xs font-bold text-slate-500 uppercase tracking-widest">الصق الكود أو الرابط المشفر هنا</label>
                            <textarea id="inputData" placeholder="الصق الرابط (intent://) أو مصفوفة Base64..." class="w-full rounded-2xl px-5 py-4 text-[10px] font-mono h-48 outline-none leading-relaxed"></textarea>
                        </div>

                        <div class="space-y-2">
                            <label class="text-xs font-bold text-slate-500 uppercase tracking-widest">الرمز السري (Security Key)</label>
                            <input type="password" id="secretKey" placeholder="ادخل الرمز السري للفك..." class="w-full rounded-xl px-4 py-3 text-sm">
                        </div>

                        <button onclick="imperialDecrypt()" class="w-full bg-red-600 py-5 rounded-2xl text-white font-black text-xl hover:bg-red-500 transition-all transform hover:scale-105 shadow-xl shadow-red-900/20">
                            <i class="fas fa-unlock-keyhole ml-2"></i> بـدء استخراج البيانات
                        </button>
                    </div>
                </div>
            </div>

            <!-- لوحة النتائج (الجهة اليسرى) -->
            <div class="lg:col-span-7">
                <div id="placeholder" class="imperial-glass p-20 rounded-[2.5rem] text-center opacity-30 border-dashed border-2 border-slate-700">
                    <i class="fas fa-satellite-dish text-7xl mb-6"></i>
                    <p class="text-xl">بانتظار تلقي البيانات للبدء في التحليل التقني...</p>
                </div>

                <div id="resultBox" class="hidden space-y-6">
                    <div class="flex justify-between items-center px-4">
                        <h2 class="text-green-400 font-bold flex items-center gap-2"><i class="fas fa-circle-check"></i> تم فك التشفير بنجاح</h2>
                        <button onclick="location.reload()" class="text-slate-500 text-xs hover:text-white"><i class="fas fa-rotate"></i> مسح التحليل</button>
                    </div>
                    
                    <div id="analysisContainer" class="space-y-6">
                        <!-- Server cards will be injected here -->
                    </div>
                </div>
            </div>

        </div>
    </div>

    <script>
        function imperialDecrypt() {
            let input = document.getElementById('inputData').value.trim();
            const key = document.getElementById('secretKey').value;
            const container = document.getElementById('analysisContainer');
            const placeholder = document.getElementById('placeholder');
            const resultBox = document.getElementById('resultBox');

            if (!input || !key) return alert("يرجى إدخال البيانات والرمز السري!");

            try {
                let base64String = "";

                // 1. استخراج الـ Base64 إذا كان المدخل رابط Intent كاملاً
                if (input.includes("intent://open?url=")) {
                    base64String = input.split("url=")[1].split("#")[0];
                } 
                // 2. استخراج الـ Base64 إذا كان المدخل داخل خاصية onclick
                else if (input.includes("location.href='")) {
                    const inner = input.split("url=")[1].split("#")[0];
                    base64String = inner;
                }
                else {
                    base64String = input;
                }

                // 3. فك تشفير Base64
                const decryptedRaw = decodeURIComponent(escape(atob(base64String)));
                
                // 4. فحص الرمز السري (Key Check)
                const parts = decryptedRaw.split("::");
                if (parts[0] !== key) {
                    return alert("الرمز السري غير صحيح! تعذر الوصول للمصفوفة.");
                }

                const matrixContent = parts[1];
                container.innerHTML = "";

                // 5. تحليل السيرفرات (الرئيسي والبدلاء)
                const mainServerPart = matrixContent.split("|servers=")[0];
                const backupServersPart = matrixContent.includes("|servers=") ? matrixContent.split("|servers=")[1] : "";

                renderServerCard(mainServerPart, "السيرفر الرئيسي [u]");

                if (backupServersPart) {
                    const backups = backupServersPart.split(",");
                    backups.forEach((s, i) => renderServerCard(s, `سيرفر بديل [u${i+1}]`));
                }

                placeholder.classList.add('hidden');
                resultBox.classList.remove('hidden');

            } catch (e) {
                alert("خطأ: البيانات المدخلة غير صالحة أو مشفرة بطريقة مختلفة.");
                console.error(e);
            }
        }

        function renderServerCard(fullString, title) {
            const container = document.getElementById('analysisContainer');
            
            // فصل الرابط عن الترويسات
            const segments = fullString.split("|");
            const url = segments[0];
            const metadata = segments.slice(1);

            let badgesHtml = metadata.map(m => {
                const [k, v] = m.split("=");
                return `<div class="flex items-center gap-2 bg-black/30 p-1.5 px-3 rounded-lg border border-slate-800">
                            <span class="text-[9px] font-black text-red-400 uppercase">${k}:</span>
                            <span class="text-[10px] text-slate-300 truncate max-w-[150px]">${v || 'True'}</span>
                        </div>`;
            }).join("");

            // كشف DRM
            const hasDRM = fullString.includes("drmLicense=");
            const drmKey = hasDRM ? fullString.split("drmLicense=")[1].split("|")[0].split("&")[0] : null;

            container.innerHTML += `
                <div class="server-card imperial-glass p-6 rounded-3xl animate-in fade-in slide-in-from-bottom duration-500">
                    <div class="flex justify-between items-start mb-4">
                        <h3 class="text-blue-400 font-black text-sm uppercase tracking-tighter">${title}</h3>
                        ${hasDRM ? '<i class="fas fa-lock text-yellow-500 text-xs" title="محمي بـ ClearKey"></i>' : ''}
                    </div>
                    <div class="bg-black/50 p-4 rounded-xl border border-slate-800 mb-4">
                        <p class="text-[9px] text-slate-500 mb-1 uppercase font-bold">Stream URL:</p>
                        <p class="text-xs font-mono text-slate-200 break-all select-all">${url}</p>
                    </div>
                    ${drmKey ? `<div class="mb-4 p-3 bg-yellow-900/10 border border-yellow-900/30 rounded-xl text-[10px] font-bold text-yellow-500">
                                    DRM KEY: <span class="text-slate-300 select-all ml-2">${drmKey}</span>
                                </div>` : ''}
                    <div class="grid grid-cols-1 md:grid-cols-2 gap-2">
                        ${badgesHtml || '<p class="text-[10px] text-slate-700 italic">لا توجد ترويسات Headers</p>'}
                    </div>
                </div>
            `;
        }
    </script>
</body>
</html>
