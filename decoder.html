<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ballon Turbo - Royal Decoder V300</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Cairo:wght@300;400;700;900&display=swap');
        body { background-color: #030712; color: #f8fafc; font-family: 'Cairo', sans-serif; }
        .imperial-glass { background: rgba(17, 24, 39, 0.7); backdrop-filter: blur(15px); border: 1px solid rgba(239, 68, 68, 0.2); }
        input, textarea { background: #0f172a !important; border: 1px solid #1e293b !important; color: #fff !important; }
        .badge { background: rgba(239, 68, 68, 0.1); color: #f87171; border: 1px solid rgba(239, 68, 68, 0.2); padding: 2px 10px; border-radius: 8px; font-size: 10px; font-weight: 900; text-transform: uppercase; }
        .server-card { border-right: 5px solid #ef4444; background: linear-gradient(to left, rgba(239, 68, 68, 0.05), transparent); }
    </style>
</head>
<body class="p-4 md:p-8">

    <div class="max-w-6xl mx-auto">
        <header class="flex flex-col md:flex-row justify-between items-center mb-16 gap-6">
            <h1 class="text-4xl font-black text-red-500 tracking-tighter">مفكك الشفرات الملكي V300</h1>
            <a href="index.html" class="text-slate-500 hover:text-blue-400 transition-all font-bold flex items-center gap-2">
                <i class="fas fa-arrow-right"></i> العودة لمصنع الروابط
            </a>
        </header>

        <div class="grid grid-cols-1 lg:grid-cols-12 gap-10">
            <!-- Left: Decryption Form -->
            <div class="lg:col-span-5 space-y-6">
                <div class="imperial-glass p-8 rounded-[2.5rem] border-red-500/20 shadow-red-950/20 shadow-2xl">
                    <h2 class="text-xl font-bold mb-6 text-red-400 flex items-center gap-3">
                        <i class="fas fa-shield-virus"></i> تحليل البيانات المشفرة
                    </h2>
                    
                    <div class="space-y-6">
                        <div class="space-y-2">
                            <label class="text-xs font-bold text-slate-500 uppercase">المصفوفة المشفرة أو رابط الـ Intent</label>
                            <textarea id="inputData" placeholder="الصق الرابط هنا..." class="w-full rounded-2xl px-5 py-4 text-[10px] font-mono h-48 focus:border-red-500 focus:ring-1 focus:ring-red-500 outline-none"></textarea>
                        </div>
                        <button onclick="imperialAnalyze()" class="w-full bg-red-600 py-5 rounded-2xl text-white font-black text-xl hover:bg-red-500 transition-all transform hover:scale-105 shadow-xl shadow-red-900/20">
                            <i class="fas fa-microchip ml-2"></i> استخراج المعلومات التقنية
                        </button>
                    </div>
                </div>
            </div>

            <!-- Right: Live Analysis Result -->
            <div class="lg:col-span-7">
                <div id="placeholder" class="imperial-glass p-20 rounded-[2.5rem] text-center opacity-30 border-dashed border-2 border-slate-700">
                    <i class="fas fa-satellite-dish text-7xl mb-6"></i>
                    <p class="text-xl">بانتظار تلقي الإشارة للتحليل...</p>
                </div>

                <div id="resultBox" class="hidden space-y-6">
                    <div class="flex justify-between items-center px-4">
                        <h2 class="text-green-400 font-bold flex items-center gap-2"><i class="fas fa-circle-check"></i> تم فك التغليف بنجاح</h2>
                        <button onclick="location.reload()" class="text-slate-500 text-xs hover:text-white"><i class="fas fa-rotate"></i> مسح التحليل</button>
                    </div>
                    <div id="analysisContainer" class="space-y-6">
                        <!-- Server cards injected here -->
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script>
        function imperialAnalyze() {
            let input = document.getElementById('inputData').value.trim();
            const container = document.getElementById('analysisContainer');
            const placeholder = document.getElementById('placeholder');
            const resultBox = document.getElementById('resultBox');

            if (!input) return;

            try {
                let matrixString = "";

                // 1. معالجة إذا كان المدخل رابط Intent
                if (input.startsWith("intent://")) {
                    const urlParam = new URL(input.replace("intent://", "http://")).searchParams.get("url");
                    matrixString = decodeURIComponent(urlParam);
                } 
                // 2. معالجة إذا كان المدخل Base64 (ballon::...)
                else {
                    try {
                        const decoded = decodeURIComponent(escape(atob(input)));
                        if (decoded.includes("ballon::")) matrixString = decoded.split("ballon::")[1];
                        else matrixString = decoded;
                    } catch(e) { matrixString = input; }
                }

                container.innerHTML = "";
                
                // 3. تحليل السيرفرات البديلة
                const parts = matrixString.split("|servers=");
                const mainServer = parts[0];
                const backupServers = parts[1] ? parts[1].split(",") : [];

                renderServerCard(mainServer, "الرئيسي [u]");
                backupServers.forEach((s, i) => renderServerCard(s, `بديل [u${i+1}]`));

                placeholder.classList.add('hidden');
                resultBox.classList.remove('hidden');

            } catch (e) {
                alert("خطأ في بنية المصفوفة: " + e.message);
            }
        }

        function renderServerCard(fullString, title) {
            const container = document.getElementById('analysisContainer');
            const segments = fullString.split("|");
            const streamUrl = segments[0];
            const meta = segments.slice(1);

            let badges = meta.map(m => `<span class="badge">${m}</span>`).join("");
            
            // كشف DRM
            const isDRM = fullString.includes("drmLicense=");
            const drmKey = isDRM ? fullString.split("drmLicense=")[1].split("|")[0].split("&")[0] : null;

            container.innerHTML += `
                <div class="server-card imperial-glass p-6 rounded-3xl animate-in fade-in slide-in-from-left duration-500">
                    <div class="flex justify-between items-start mb-4">
                        <h3 class="text-blue-400 font-black text-sm uppercase tracking-tighter">${title}</h3>
                        ${isDRM ? '<i class="fas fa-shield-halved text-yellow-500 text-sm"></i>' : ''}
                    </div>
                    <div class="bg-black/50 p-4 rounded-xl border border-slate-800 mb-4">
                        <p class="text-[10px] text-slate-500 mb-1">Direct Stream Endpoint:</p>
                        <p class="text-xs font-mono text-slate-200 break-all select-all">${streamUrl}</p>
                    </div>
                    ${drmKey ? `<div class="mb-4 text-[10px] font-bold text-yellow-600">DRM KEY: <span class="text-slate-400 select-all">${drmKey}</span></div>` : ''}
                    <div class="flex flex-wrap gap-2">
                        ${badges || '<span class="text-[10px] text-slate-700 italic">No custom headers</span>'}
                    </div>
                </div>
            `;
        }
    </script>
</body>
</html>
