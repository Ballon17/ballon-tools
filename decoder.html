<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ballon Turbo - Royal Decoder V310</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Cairo:wght@300;400;700;900&display=swap');
        body { background-color: #020617; color: #f8fafc; font-family: 'Cairo', sans-serif; }
        .imperial-glass { background: rgba(239, 68, 68, 0.05); backdrop-filter: blur(15px); border: 1px solid rgba(239, 68, 68, 0.2); }
        input, textarea { background: #0f172a !important; border: 1px solid #1e293b !important; color: #fff !important; }
        .badge { background: rgba(239, 68, 68, 0.2); color: #f87171; padding: 2px 8px; border-radius: 6px; font-size: 10px; font-weight: bold; }
    </style>
</head>
<body class="p-4 md:p-10">

    <div class="max-w-5xl mx-auto">
        <header class="flex justify-between items-center mb-12">
            <h1 class="text-4xl font-black text-red-500 tracking-tighter">مفكك الشفرات الملكي</h1>
            <a href="index.html" class="text-slate-500 hover:text-blue-400 transition italic font-bold"><i class="fas fa-arrow-right ml-2"></i>العودة للمصنع</a>
        </header>

        <div class="grid grid-cols-1 lg:grid-cols-12 gap-8">
            <div class="lg:col-span-5 space-y-6">
                <div class="imperial-glass p-8 rounded-[2.5rem] shadow-2xl">
                    <h2 class="text-xl font-bold mb-6 text-red-400"><i class="fas fa-unlock-keyhole ml-2"></i>فك الحماية</h2>
                    <div class="space-y-4">
                        <textarea id="inputEnc" placeholder="الصق المصفوفة المشفرة هنا..." class="w-full rounded-2xl px-4 py-3 text-[10px] font-mono h-40 outline-none focus:border-red-500"></textarea>
                        <input type="password" id="secretKey" placeholder="ادخل الرمز السري للفك..." class="w-full rounded-xl px-4 py-3 text-sm border-red-500/30">
                        <button onclick="decryptAndParse()" class="w-full bg-red-600 py-4 rounded-2xl text-white font-black hover:bg-red-500 transition shadow-lg text-lg">تحليل ومعالجة البيانات</button>
                    </div>
                </div>
            </div>

            <div class="lg:col-span-7">
                <div id="resultBox" class="hidden space-y-4">
                    <h2 class="text-green-400 font-bold px-2 italic underline text-lg">البيانات التقنية المستخرجة:</h2>
                    <div id="analysisContent" class="space-y-4"></div>
                </div>
                <div id="placeholder" class="imperial-glass p-20 rounded-[2.5rem] text-center opacity-30">
                    <i class="fas fa-satellite-dish text-6xl mb-4"></i>
                    <p>أدخل البيانات والرمز السري للبدء...</p>
                </div>
            </div>
        </div>
    </div>

    <script>
        function decryptAndParse() {
            const input = document.getElementById('inputEnc').value.trim();
            const key = document.getElementById('secretKey').value;
            const content = document.getElementById('analysisContent');

            if(!input || !key) return alert("يرجى إدخال البيانات والرمز السري!");

            try {
                const dec = decodeURIComponent(escape(atob(input)));
                const parts = dec.split("::");
                
                // التحقق من تطابق الرمز السري
                if (parts[0] !== key) {
                    return alert("الرمز السري غير صحيح! تعذر فك تشفير البيانات.");
                }
                
                const master = parts[1];
                content.innerHTML = "";

                // تحليل السيرفر الرئيسي والبدلاء
                const mainPart = master.split("|servers=")[0];
                render(mainPart, "الرئيسي");

                if (master.includes("|servers=")) {
                    master.split("|servers=")[1].split(",").forEach((s, i) => render(s, `بديل ${i+1}`));
                }

                document.getElementById('resultBox').classList.remove('hidden');
                document.getElementById('placeholder').classList.add('hidden');
            } catch (e) { alert("فشل التحليل! تأكد من النص المشفر."); }
        }

        function render(full, title) {
            const url = full.split("|")[0];
            const meta = full.split("|").slice(1);
            let badges = meta.map(m => `<span class="badge">${m}</span>`).join(" ");
            
            document.getElementById('analysisContent').innerHTML += `
                <div class="bg-slate-900/80 p-5 rounded-3xl border-r-4 border-red-500 shadow-xl">
                    <h3 class="text-blue-400 font-black text-sm">${title}</h3>
                    <p class="text-[10px] text-slate-400 font-mono mt-2 break-all select-all">${url}</p>
                    <div class="mt-3 flex flex-wrap gap-2">${badges || '<span class="text-slate-700 italic text-[10px]">No headers</span>'}</div>
                </div>`;
        }
    </script>
</body>
</html>
